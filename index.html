<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帧影板</title>
<link href="https://fontsapi.zeoseven.com/788/main/result.css" onload="this.rel='stylesheet'" rel="preload" as="style" crossorigin />
<noscript><link rel="stylesheet" href="https://fontsapi.zeoseven.com/788/main/result.css" /></noscript>
<style>
  /* ═══ 基础重置 ═══ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon: #39ff14;
    --neon-dim: #39ff1488;
    --neon-glow: #39ff1444;
    --neon-dark: #0a3d00;
    --bg-deep: #0a0a0f;
    --bg-panel: #0d0d14;
    --bg-card: #111118;
    --bg-input: #0c0c12;
    --border: #39ff1433;
    --border-hover: #39ff1488;
    --text: #e0e0e0;
    --text-dim: #888;
    --font-main: "FashionBitmap16", sans-serif;
    --grid-gap: 16px;
    --radius: 4px;
  }

  html { font-size: 14px; }

  body {
    font-family: var(--font-main);
    font-weight: normal;
    background: var(--bg-deep);
    color: var(--text);
    height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ═══ 扫描线 + 噪点背景 ═══ */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(57, 255, 20, 0.015) 2px,
      rgba(57, 255, 20, 0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9998;
  }

  /* ═══ 顶部标题栏 ═══ */
  .header {
    width: 100%;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d0d14 0%, var(--bg-deep) 100%);
    position: relative;
  }

  .header::after {
    content: "";
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-dim), transparent);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo-main {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon-dim), 0 0 30px var(--neon-glow);
    letter-spacing: 4px;
  }

  .logo-sub {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    border-left: 1px solid var(--border);
    padding-left: 12px;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .header-link {
    color: var(--text-dim);
    text-decoration: none;
    position: relative;
    transition: color 0.2s;
    padding-bottom: 2px;
  }

  .header-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 0;
    height: 1px;
    background: var(--neon);
    box-shadow: 0 0 4px var(--neon-dim);
    transition: width 0.3s ease;
  }

  .header-link:hover {
    color: var(--neon);
  }

  .header-link:hover::after {
    width: 100%;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 6px var(--neon);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ═══ 主内容区域 - 两栏布局 ═══ */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: minmax(0, 1fr);
    gap: 0;
    padding: 0;
    min-height: 0;
  }

  /* ═══ 左侧面板 - 处理步骤 + 参数 ═══ */
  .panel-left {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .panel-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--neon);
    letter-spacing: 3px;
    height: 48px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: "";
    width: 3px;
    height: 14px;
    background: var(--neon);
    box-shadow: 0 0 6px var(--neon-dim);
  }

  .steps-container {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .steps-container::-webkit-scrollbar { width: 4px; }
  .steps-container::-webkit-scrollbar-track { background: transparent; }
  .steps-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .step-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .step-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--neon-dim);
    transition: background 0.2s;
  }

  .step-card:hover {
    border-color: var(--border-hover);
    background: #141420;
  }

  .step-card:hover::before {
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon-dim);
  }

  .step-card.active {
    border-color: var(--neon-dim);
    background: #141420;
  }

  .step-card.active::before {
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon-dim);
  }

  .step-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
  }

  .step-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .step-num {
    font-size: 0.65rem;
    color: var(--neon);
    font-weight: 700;
    background: var(--neon-dark);
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .step-name {
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 600;
  }

  .step-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-expand {
    width: 20px; height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 0.7rem;
    transition: transform 0.25s ease;
    cursor: pointer;
  }

  .step-card.expanded .step-expand {
    transform: rotate(180deg);
  }

  .step-toggle {
    position: relative;
    width: 32px; height: 16px;
    background: #1a1a24;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .step-toggle.on {
    background: var(--neon-dark);
    border-color: var(--neon-dim);
  }

  .step-toggle::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.2s;
  }

  .step-toggle.on::after {
    left: 18px;
    background: var(--neon);
    box-shadow: 0 0 6px var(--neon-dim);
  }

  /* ═══ 步骤内联参数面板 ═══ */
  .step-params-inline {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    padding: 0 16px;
    border-top: 0px solid var(--border);
  }

  .step-card.expanded .step-params-inline {
    max-height: 500px;
    padding: 12px 16px 14px;
    border-top-width: 1px;
  }

  /* ═══ 参数通用 ═══ */
  .param-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .param-row:last-child { margin-bottom: 0; }

  .param-label {
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .param-value {
    font-size: 0.75rem;
    color: var(--neon);
    font-weight: 600;
    min-width: 36px;
    text-align: right;
  }

  .param-input-group {
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .param-num-input {
    background: transparent;
    border: none;
    color: var(--neon);
    font-size: 0.75rem;
    font-weight: 600;
    font-family: var(--font-main);
    text-align: right;
    width: 38px;
    padding: 0;
    outline: none;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .param-num-input:hover, .param-num-input:focus {
    border-bottom-color: var(--neon-dim);
  }

  .param-num-input::-webkit-outer-spin-button,
  .param-num-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .param-unit {
    font-size: 0.75rem;
    color: var(--neon);
    font-weight: 600;
    margin-left: 2px;
  }

  .param-slider {
    width: 100%;
    margin-top: 6px;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #1a1a24;
    border-radius: 2px;
    outline: none;
  }

  .param-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--neon);
    cursor: pointer;
    box-shadow: 0 0 6px var(--neon-dim);
    border: 2px solid var(--bg-deep);
  }

  .param-slider::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--neon);
    cursor: pointer;
    box-shadow: 0 0 6px var(--neon-dim);
    border: 2px solid var(--bg-deep);
  }

  /* ═══ 中央画布区域 ═══ */
  .canvas-area {
    display: flex;
    flex-direction: column;
    background: var(--bg-deep);
    position: relative;
    min-height: 0;
  }

  .canvas-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 48px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .toolbar-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    font-size: 0.75rem;
    font-family: var(--font-main);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .toolbar-btn:hover {
    border-color: var(--border-hover);
    color: var(--neon);
  }

  .toolbar-btn.primary {
    background: var(--neon-dark);
    border-color: var(--neon-dim);
    color: var(--neon);
  }

  .toolbar-btn.primary:hover {
    background: #0d5200;
    box-shadow: 0 0 12px var(--neon-glow);
  }

  .zoom-info {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .canvas-viewport {
    flex: 1;
    position: relative;
    overflow: auto;
  }

  /* 网格背景 */
  .canvas-viewport::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
  }

  .upload-zone {
    width: 480px;
    height: 360px;
    border: 2px dashed var(--neon-dim);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.3s;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    background: rgba(10, 61, 0, 0.05);
  }

  .upload-zone:hover {
    border-color: var(--neon);
    background: rgba(57, 255, 20, 0.03);
    box-shadow: 0 0 40px var(--neon-glow);
  }

  .upload-icon {
    width: 56px; height: 56px;
    border: 2px solid var(--neon-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .upload-icon::before {
    content: "";
    width: 2px; height: 22px;
    background: var(--neon-dim);
    position: absolute;
  }

  .upload-icon::after {
    content: "";
    width: 22px; height: 2px;
    background: var(--neon-dim);
    position: absolute;
  }

  .upload-text {
    font-size: 0.9rem;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .upload-hint {
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 1px;
  }

  .preview-container {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 10000;
    overflow: auto;
    align-items: center;
    justify-content: center;
  }

  .canvas-wrapper {
    display: block;
    transform-origin: 0 0;
    transition: transform 0.15s ease;
    margin: auto;
    flex-shrink: 0;
  }

  .preview-container canvas {
    border: 1px solid var(--border);
    display: block;
  }

  /* 底部状态栏 */
  .canvas-status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-panel);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ═══ 底部操作栏 ═══ */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg-panel);
  }

  .footer-info {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .footer-link {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-decoration: none;
    position: relative;
    transition: color 0.2s;
    padding-bottom: 2px;
  }

  .footer-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 0;
    height: 1px;
    background: var(--neon);
    box-shadow: 0 0 4px var(--neon-dim);
    transition: width 0.3s ease;
  }

  .footer-link:hover {
    color: var(--neon);
  }

  .footer-link:hover::after {
    width: 100%;
  }

  .footer-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 8px 24px;
    font-size: 0.8rem;
    font-family: var(--font-main);
    font-weight: 600;
    letter-spacing: 2px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-dim);
  }

  .btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--neon-dark), #0d5200);
    border-color: var(--neon-dim);
    color: var(--neon);
    text-shadow: 0 0 8px var(--neon-glow);
  }

  .btn-primary:hover {
    box-shadow: 0 0 20px var(--neon-glow), inset 0 0 20px var(--neon-glow);
  }

  /* ═══ 隐藏的文件输入 ═══ */
  #fileInput { display: none; }

  /* ═══ 滚动条全局 ═══ */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ═══ 色板相关 ═══ */
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 4px;
    margin-top: 8px;
  }

  .palette-swatch {
    aspect-ratio: 1;
    border-radius: 3px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .palette-swatch:hover {
    border-color: var(--neon);
    box-shadow: 0 0 8px var(--neon-glow);
    transform: scale(1.15);
    z-index: 1;
  }

  .palette-swatch input[type="color"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  /* ═══ 马赛克选项 ═══ */
  .mosaic-options {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 8px;
  }

  .mosaic-btn {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 0;
    font-size: 0.7rem;
    font-family: var(--font-main);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .mosaic-btn:hover {
    border-color: var(--border-hover);
    color: var(--neon);
  }

  .mosaic-btn.active {
    background: var(--neon-dark);
    border-color: var(--neon-dim);
    color: var(--neon);
    box-shadow: 0 0 8px var(--neon-glow);
  }

  /* ═══ 输入框通用 ═══ */
  .export-input {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--neon);
    padding: 8px 12px;
    font-size: 0.8rem;
    font-family: var(--font-main);
    border-radius: var(--radius);
    outline: none;
    transition: all 0.2s;
    width: 160px;
  }

  .export-input::placeholder {
    color: var(--text-dim);
  }

  .export-input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 8px var(--neon-glow);
  }

  /* ═══ 角标装饰 ═══ */
  .corner-decor {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--neon-dim);
    border-style: solid;
    border-width: 0;
    pointer-events: none;
  }
  .corner-decor.tl { top: 8px; left: 8px; border-top-width: 1px; border-left-width: 1px; }
  .corner-decor.tr { top: 8px; right: 8px; border-top-width: 1px; border-right-width: 1px; }
  .corner-decor.bl { bottom: 8px; left: 8px; border-bottom-width: 1px; border-left-width: 1px; }
  .corner-decor.br { bottom: 8px; right: 8px; border-bottom-width: 1px; border-right-width: 1px; }
</style>
</head>
<body>

  <!-- 顶部标题栏 -->
  <header class="header">
    <div class="logo">
      <span class="logo-main">帧影板</span>
      <span class="logo-sub">「一 目 千 色」</span>
    </div>
    <div class="header-status">
      <span class="status-dot"></span>
      <a class="header-link" href="https://github.com/NorthOpen/LZ-MNZYB" target="_blank" rel="noopener noreferrer">KkkkitaAkeru with Claude Code</a>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main">

    <!-- 左侧 - 处理步骤 + 内联参数 -->
    <aside class="panel-left">
      <div class="panel-title">处理流程
        <button class="toolbar-btn" onclick="randomizeAll()" style="margin-left:auto; display:flex; align-items:center; gap:4px; font-size:0.65rem; padding:3px 8px; height:auto; letter-spacing:1px; border-color:var(--border);" title="随机重置所有参数数值">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width: 12px; height: 12px;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          数值随机
        </button>
      </div>
      <div class="steps-container" id="stepsContainer">

        <!-- 步骤 〇壹 -->
        <div class="step-card" data-step="1">
          <div class="step-card-header" onclick="toggleExpand(this.parentElement)">
            <div class="step-left">
              <span class="step-num">步骤 〇壹</span>
              <span class="step-name">光学瑕疵</span>
            </div>
            <div class="step-right">
              <div class="step-toggle on" onclick="toggleStep(event, this)"></div>

<script>
  /* ═══ 全局状态 ═══ */
  const state = {
    originalImage: null,
    fileName: '',
    palette: ['#1a1c2c','#333c57','#a7f070','#ffcd75','#a7f070','#38b764','#257179','#b13e53','#5d275d'],
    mosaicSize: 10,
    zoom: 1,
    zoomMin: 0.1,
    zoomMax: 5,
    glitchRandoms: []
  };

  function rerollGlitch(isInit = false) {
    state.glitchRandoms = Array.from({length: 4000}, () => Math.random());
    // 页面初次加载时跳过 scheduleProcess，避免遇到 let 变量的 TDZ(暂时性死区) 导致脚本崩溃
    if (!isInit && typeof scheduleProcess === 'function') scheduleProcess();
  }
  rerollGlitch(true); // 隐式初始化随机数池

  /* ═══ 初始化色板 ═══ */
  function initPalette() {
    const grid = document.getElementById('paletteGrid');
    grid.innerHTML = '';
    state.palette.forEach((color, i) => {
      const swatch = document.createElement('div');
      swatch.className = 'palette-swatch';
      swatch.style.background = color;
      const input = document.createElement('input');
      input.type = 'color';
      input.value = color;
      input.addEventListener('input', function() {
        state.palette[i] = this.value;
        swatch.style.background = this.value;
        scheduleProcess();
      });
      swatch.appendChild(input);
      grid.appendChild(swatch);
    });
  }
  initPalette();

  /* 原马赛克按钮逻辑已替换为滑动条 */

  /* ═══ 步骤卡片展开/折叠 ═══ */
  function toggleExpand(card) {
    card.classList.toggle('expanded');
  }

  /* ═══ 步骤开关 ═══ */
  function toggleStep(e, el) {
    e.stopPropagation();
    el.classList.toggle('on');
    scheduleProcess();
  }

  /* ═══ 文件上传 ═══ */
  function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    state.fileName = file.name;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = new Image();
      img.onload = function() {
        state.originalImage = img;
        showPreview(img);
        document.getElementById('imgInfo').textContent =
          `${file.name}  |  ${img.width} × ${img.height}  |  ${(file.size / 1024).toFixed(1)} KB`;
        document.getElementById('processStatus').textContent = '已加载';
        zoomFit();
        scheduleProcess();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function showPreview(img) {
    const uploadZone = document.getElementById('uploadZone');
    const previewContainer = document.getElementById('previewContainer');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    uploadZone.style.display = 'none';
    previewContainer.style.display = 'flex';
  }

  /* ═══ 缩放功能 ═══ */
  function updateZoomDisplay() {
    document.getElementById('zoomInfo').textContent = `缩放: ${Math.round(state.zoom * 100)}%`;
    const canvas = document.getElementById('mainCanvas');
    const wrapper = document.getElementById('canvasWrapper');
    if (!state.originalImage) return;
    wrapper.style.transform = `scale(${state.zoom})`;
    wrapper.style.width = canvas.width * state.zoom + 'px';
    wrapper.style.height = canvas.height * state.zoom + 'px';
  }

  function zoomIn() {
    if (!state.originalImage) return;
    state.zoom = Math.min(state.zoomMax, state.zoom * 1.25);
    updateZoomDisplay();
  }

  function zoomOut() {
    if (!state.originalImage) return;
    state.zoom = Math.max(state.zoomMin, state.zoom / 1.25);
    updateZoomDisplay();
  }

  function zoomReset() {
    if (!state.originalImage) return;
    state.zoom = 1;
    updateZoomDisplay();
  }

  function zoomFit() {
    if (!state.originalImage) return;
    const viewport = document.getElementById('canvasViewport');
    const vw = viewport.clientWidth * 0.9;
    const vh = viewport.clientHeight * 0.9;
    const iw = state.originalImage.width;
    const ih = state.originalImage.height;
    state.zoom = Math.min(vw / iw, vh / ih, 1);
    updateZoomDisplay();
  }

  // 鼠标滚轮缩放
  document.getElementById('canvasViewport').addEventListener('wheel', function(e) {
    if (!state.originalImage) return;
    e.preventDefault();
    if (e.deltaY < 0) {
      state.zoom = Math.min(state.zoomMax, state.zoom * 1.1);
    } else {
      state.zoom = Math.max(state.zoomMin, state.zoom / 1.1);
    }
    updateZoomDisplay();
  }, { passive: false });

  /* ═══ 重置 ═══ */
  function resetImage() {
    state.originalImage = null;
    state.fileName = '';
    state.zoom = 1;
    document.getElementById('fileInput').value = '';
    document.getElementById('uploadZone').style.display = 'flex';
    document.getElementById('previewContainer').style.display = 'none';
    document.getElementById('imgInfo').textContent = '未加载图片';
    document.getElementById('processStatus').textContent = '等待操作';
    updateZoomDisplay();
  }

  /* ═══ 拖拽上传 ═══ */
  const viewport = document.querySelector('.canvas-viewport');
  viewport.addEventListener('dragover', e => {
    e.preventDefault();
    document.getElementById('uploadZone').style.borderColor = 'var(--neon)';
  });
  viewport.addEventListener('dragleave', () => {
    document.getElementById('uploadZone').style.borderColor = '';
  });
  viewport.addEventListener('drop', e => {
    e.preventDefault();
    document.getElementById('uploadZone').style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const dt = new DataTransfer();
      dt.items.add(file);
      document.getElementById('fileInput').files = dt.files;
      handleFileUpload({ target: { files: [file] } });
    }
  });

  /* ═══════════════════════════════════════
     图像处理核心算法
     ═══════════════════════════════════════ */

  function isStepEnabled(stepNum) {
    const card = document.querySelector(`.step-card[data-step="${stepNum}"]`);
    if (!card) return false;
    const toggle = card.querySelector('.step-toggle');
    return toggle && toggle.classList.contains('on');
  }

  /* ── 步骤1: 桶型畸变（已同步放大以消除边缘黑边） ── */
  function applyBarrelDistortion(srcCanvas, strength, fillBlack = true) {
    const w = srcCanvas.width, h = srcCanvas.height;
    const srcCtx = srcCanvas.getContext('2d');
    const srcData = srcCtx.getImageData(0, 0, w, h);
    const dst = srcCtx.createImageData(w, h);
    const cx = w / 2, cy = h / 2;
    const maxR = Math.sqrt(cx * cx + cy * cy);
    const k = strength / 100;

    // 同步放大：因为畸变操作会使图像向内收缩导致四周产生黑边
    // 最远点（四个角处）r最大值为1，畸变后长度为 1*(1+k*1) = 1+k
    // 所以将采样坐标除以 (1+k) 进行同步放大，就能刚好填满画面并去掉所有黑边
    const scale = 1 + k;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const dx = (x - cx) / maxR;
        const dy = (y - cy) / maxR;
        const r = Math.sqrt(dx * dx + dy * dy);

        // 根据缩放系数缩小原图的采样半径，实现放大填满画面的效果
        const rDistorted = r * (1 + k * r * r);
        const rZoomed = rDistorted / scale;

        const srcX = cx + rZoomed * maxR * (dx / (r || 1));
        const srcY = cy + rZoomed * maxR * (dy / (r || 1));

        const ix = Math.round(srcX), iy = Math.round(srcY);
        const dstIdx = (y * w + x) * 4;
        if (ix >= 0 && ix < w && iy >= 0 && iy < h) {
          const srcIdx = (iy * w + ix) * 4;
          dst.data[dstIdx]     = srcData.data[srcIdx];
          dst.data[dstIdx + 1] = srcData.data[srcIdx + 1];
          dst.data[dstIdx + 2] = srcData.data[srcIdx + 2];
          dst.data[dstIdx + 3] = srcData.data[srcIdx + 3];
        } else if (fillBlack) {
          dst.data[dstIdx + 3] = 255;
        }
      }
    }
    srcCtx.putImageData(dst, 0, 0);
  }

  /* ── 步骤1: 暗角 ── */
  function applyVignette(canvas, strength) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h / 2;
    const radius = Math.sqrt(cx * cx + cy * cy);
    const innerR = radius * (1 - strength / 100);

    const gradient = ctx.createRadialGradient(cx, cy, innerR, cx, cy, radius);
    gradient.addColorStop(0, 'rgba(0,0,0,0)');
    gradient.addColorStop(1, `rgba(0,0,0,${0.3 + strength / 100 * 0.6})`);

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
  }

  /* ── 步骤2: 阈值处理（色阶分离） ── */
  function applyThresholdPosterize(canvas, levels) {
    if (levels <= 1) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const imgData = ctx.getImageData(0, 0, w, h);
    const data = imgData.data;
    const step = 255 / (levels - 1);

    for (let i = 0; i < data.length; i += 4) {
      data[i]     = Math.round(data[i] / step) * step;
      data[i + 1] = Math.round(data[i + 1] / step) * step;
      data[i + 2] = Math.round(data[i + 2] / step) * step;
    }
    ctx.putImageData(imgData, 0, 0);
  }

  /* ── 步骤2: 曝光滤镜与对比度统一处理 ── */
  function applyTonesAndContrast(canvas, contrastValue, hVal, mVal, sVal, bVal) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const imgData = ctx.getImageData(0, 0, w, h);
    const data = imgData.data;

    // 构建256级色调与对比度映射LUT表，极大提高处理速度（避免百万次求峰值计算）
    const lut = new Uint8Array(256);

    // 转化数值到合适的权重影响力度
    const b = bVal / 100 * 0.25;
    const s = sVal / 100 * 0.25;
    const m = mVal / 100 * 0.3;
    const hl = hVal / 100 * 0.25;

    // 对比度系数
    const c = contrastValue * 2.55;
    const factor = (259 * (c + 255)) / (255 * (259 - c));

    for (let i = 0; i < 256; i++) {
      let x = i / 255;

      // 平滑计算每个像素值在四个色调区间的响应权重
      let wB = Math.max(0, 1 - x * 2.5);                   // 黑色区响应
      let wS = Math.max(0, 1 - Math.abs(x - 0.25) * 4);    // 阴影区响应
      let wM = Math.max(0, 1 - Math.abs(x - 0.5) * 2);     // 灰度（中间调）响应
      let wH = Math.max(0, (x - 0.5) * 2);                 // 高光区响应

      // 应用区域色调偏移
      let x2 = x + b * wB + s * wS + m * wM + hl * wH;
      x2 = Math.min(1, Math.max(0, x2));
      let val = x2 * 255;

      // 叠加原有的对比度公式
      if (contrastValue !== 0) {
        val = (val - 128) * factor + 128;
      }

      lut[i] = Math.min(255, Math.max(0, Math.round(val)));
    }

    // 采用LUT查表法快速映射全图像素
    for (let i = 0; i < data.length; i += 4) {
      data[i]     = lut[data[i]];
      data[i + 1] = lut[data[i + 1]];
      data[i + 2] = lut[data[i + 2]];
    }
    ctx.putImageData(imgData, 0, 0);
  }

  /* ── 步骤4: 颜色强制索引（带杂色仿色） ── */
  function hexToRgb(hex) {
    const v = parseInt(hex.replace('#', ''), 16);
    return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
  }

  function colorDistance(r1, g1, b1, r2, g2, b2) {
    const dr = r1 - r2, dg = g1 - g2, db = b1 - b2;
    return dr * dr + dg * dg + db * db;
  }

  function findClosestColor(r, g, b, paletteRgb) {
    let minDist = Infinity, best = 0;
    for (let i = 0; i < paletteRgb.length; i++) {
      const d = colorDistance(r, g, b, paletteRgb[i][0], paletteRgb[i][1], paletteRgb[i][2]);
      if (d < minDist) { minDist = d; best = i; }
    }
    return paletteRgb[best];
  }

  function applyColorIndex(canvas, palette) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const imgData = ctx.getImageData(0, 0, w, h);
    const data = imgData.data;
    const paletteRgb = palette.map(hexToRgb);

    for (let i = 0; i < data.length; i += 4) {
      const noise = (Math.random() - 0.5) * 50;
      const r = Math.min(255, Math.max(0, data[i] + noise));
      const g = Math.min(255, Math.max(0, data[i + 1] + noise));
      const b = Math.min(255, Math.max(0, data[i + 2] + noise));
      const c = findClosestColor(r, g, b, paletteRgb);
      data[i] = c[0]; data[i + 1] = c[1]; data[i + 2] = c[2];
    }
    ctx.putImageData(imgData, 0, 0);
  }

  /* ── 步骤5: 马赛克 ── */
  function applyMosaic(canvas, blockSize) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const imgData = ctx.getImageData(0, 0, w, h);
    const data = imgData.data;

    for (let by = 0; by < h; by += blockSize) {
      for (let bx = 0; bx < w; bx += blockSize) {
        let rSum = 0, gSum = 0, bSum = 0, count = 0;
        const bw = Math.min(blockSize, w - bx);
        const bh = Math.min(blockSize, h - by);

        for (let y = by; y < by + bh; y++) {
          for (let x = bx; x < bx + bw; x++) {
            const idx = (y * w + x) * 4;
            rSum += data[idx]; gSum += data[idx + 1]; bSum += data[idx + 2];
            count++;
          }
        }
        const rAvg = Math.round(rSum / count);
        const gAvg = Math.round(gSum / count);
        const bAvg = Math.round(bSum / count);

        for (let y = by; y < by + bh; y++) {
          for (let x = bx; x < bx + bw; x++) {
            const idx = (y * w + x) * 4;
            data[idx] = rAvg; data[idx + 1] = gAvg; data[idx + 2] = bAvg;
          }
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);
  }

  /* ── 步骤7: 视觉效果（黑块故障、红蓝失真、扫描线） ── */
  function applyBlackBlockGlitch(canvas, intensity, blockSize) {
    if (intensity <= 0 || !state.glitchRandoms) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;

    // 基于强度与长宽计算理论方块数，但受限于随机池容量
    const targetCount = Math.floor((intensity / 100) * (h / blockSize) * 1.5);
    const count = Math.min(targetCount, Math.floor(state.glitchRandoms.length / 4));

    ctx.fillStyle = '#000000';
    let rIdx = 0;
    for(let i = 0; i < count; i++) {
        const by = Math.floor(state.glitchRandoms[rIdx++] * (h / blockSize)) * blockSize;
        const bx = Math.floor(state.glitchRandoms[rIdx++] * (w / blockSize)) * blockSize;
        const bw = Math.floor(state.glitchRandoms[rIdx++] * 8 + 2) * blockSize;
        const bh = Math.floor(state.glitchRandoms[rIdx++] * 2 + 1) * blockSize;
        ctx.fillRect(bx, by, bw, bh);
    }
  }

  function applyRGBSplit(canvas, offset) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const imgData = ctx.getImageData(0, 0, w, h);
    const data = imgData.data;
    const outData = new Uint8ClampedArray(data);

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const idx = (y * w + x) * 4;

        // 红色通道采样右侧像素（视觉左移），蓝色通道采样左侧像素（视觉右移）
        const rX = Math.min(w - 1, x + offset);
        const bX = Math.max(0, x - offset);

        const rIdx = (y * w + rX) * 4;
        const bIdx = (y * w + bX) * 4;

        outData[idx] = data[rIdx];         // R
        outData[idx + 2] = data[bIdx + 2]; // B
      }
    }
    data.set(outData);
    ctx.putImageData(imgData, 0, 0);
  }

  function applyScanlines(canvas, thickness, distortStrength = 0) {
    if (thickness <= 0) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;

    if (distortStrength > 0) {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = w;
      tempCanvas.height = h;
      const tCtx = tempCanvas.getContext('2d');
      tCtx.fillStyle = 'rgba(0, 0, 0, 0.35)'; // 半透明黑线
      for (let y = 0; y < h; y += thickness * 2) {
        tCtx.fillRect(0, y, w, thickness);
      }
      applyBarrelDistortion(tempCanvas, distortStrength, false); // 叠加模式下禁用溢出填黑
      ctx.drawImage(tempCanvas, 0, 0);
    } else {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
      for (let y = 0; y < h; y += thickness * 2) {
        ctx.fillRect(0, y, w, thickness);
      }
    }
  }

  /* ═══ 双向绑定同步 ═══ */
  function syncParam(targetId, val) {
    const el = document.getElementById(targetId);
    if (el) el.value = val;
  }

  /* ═══ 配置状态追踪 ═══ */
  state.configName = '默认';
  function setConfigName(name) {
    if (state.configName !== name) {
      state.configName = name;
      const el = document.getElementById('configStatus');
      if (el) el.textContent = `当前加载配置：${state.configName}`;
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('stepsContainer');
    if(container) {
      container.addEventListener('input', (e) => {
        if (['range', 'number', 'color'].includes(e.target.type)) setConfigName('自定义');
      });
      container.addEventListener('click', (e) => {
        if (e.target.classList.contains('step-toggle')) setConfigName('自定义');
        if (e.target.textContent === '随机刷新') setConfigName('自定义');
      });
    }
  });

  /* ═══ 导出与导入配置 ═══ */
  function exportConfig() {
    const config = {
      distort: document.getElementById('distortSlider').value,
      vignette: document.getElementById('vignetteSlider').value,
      contrast: document.getElementById('contrastSlider').value,
      highlights: document.getElementById('highlightsSlider').value,
      midtones: document.getElementById('midtonesSlider').value,
      shadows: document.getElementById('shadowsSlider').value,
      blacks: document.getElementById('blacksSlider').value,
      mosaic: document.getElementById('mosaicSlider').value,
      glitch: document.getElementById('glitchSlider').value,
      scanline: document.getElementById('scanlineSlider').value,

      step1Enabled: document.querySelector('.step-card[data-step="1"] .step-toggle').classList.contains('on'),
      step2Enabled: document.querySelector('.step-card[data-step="2"] .step-toggle').classList.contains('on'),
      step3Enabled: document.querySelector('.step-card[data-step="3"] .step-toggle').classList.contains('on'),
      step4Enabled: document.querySelector('.step-card[data-step="4"] .step-toggle').classList.contains('on'),
      step5Enabled: document.querySelector('.step-card[data-step="5"] .step-toggle').classList.contains('on'),
      step7Enabled: document.querySelector('.step-card[data-step="7"] .step-toggle').classList.contains('on'),

      rgbSplit: document.getElementById('rgbSplitToggle').classList.contains('on'),
      glitchEnabled: document.getElementById('glitchToggle').classList.contains('on'),
      palette: state.palette
    };

    let defaultName = state.fileName ? `帧影板配置_${state.fileName.replace(/\.[^/.]+$/, "")}` : '帧影板配置';
    let givenName = prompt("请输入要保存的配置名称：", defaultName);
    if (givenName === null) return;
    if (givenName.trim() === '') givenName = defaultName;

    const blob = new Blob([JSON.stringify(config, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const A = document.createElement('a');
    A.href = url;
    A.download = `${givenName.trim()}.json`;
    document.body.appendChild(A);
    A.click();
    document.body.removeChild(A);
    URL.revokeObjectURL(url);
  }

  function importConfig(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const config = JSON.parse(ev.target.result);

        const setVal = (id, val) => {
          if (val !== undefined && document.getElementById(id)) {
            syncParam(id, val);
            syncParam(id.replace('Slider', 'Val'), val);
          }
        };

        setVal('distortSlider', config.distort);
        setVal('vignetteSlider', config.vignette);
        setVal('contrastSlider', config.contrast);
        setVal('highlightsSlider', config.highlights);
        setVal('midtonesSlider', config.midtones);
        setVal('shadowsSlider', config.shadows);
        setVal('blacksSlider', config.blacks);
        setVal('mosaicSlider', config.mosaic);
        setVal('glitchSlider', config.glitch);
        setVal('scanlineSlider', config.scanline);

        const setToggle = (selector, val) => {
          const el = document.querySelector(selector);
          if (el && val !== undefined) {
            if (val) el.classList.add('on');
            else el.classList.remove('on');
          }
        };

        setToggle('.step-card[data-step="1"] .step-toggle', config.step1Enabled);
        setToggle('.step-card[data-step="2"] .step-toggle', config.step2Enabled);
        setToggle('.step-card[data-step="3"] .step-toggle', config.step3Enabled);
        setToggle('.step-card[data-step="4"] .step-toggle', config.step4Enabled);
        setToggle('.step-card[data-step="5"] .step-toggle', config.step5Enabled);
        setToggle('.step-card[data-step="7"] .step-toggle', config.step7Enabled);

        setToggle('#rgbSplitToggle', config.rgbSplit);
        setToggle('#glitchToggle', config.glitchEnabled);

        if (config.palette && Array.isArray(config.palette)) {
          state.palette = config.palette;
          initPalette();
        }

        setConfigName(file.name.replace(/\.[^/.]+$/, ""));
        scheduleProcess();
      } catch (err) {
        alert("配置文件读取失败，请检查文件格式是否正确！\n" + err.message);
      }
      e.target.value = ''; // 允许重复导入同一文件
    };
    reader.readAsText(file);
  }

  /* ═══ 随机 ROLL 所有数值 ═══ */
  function randomizeAll() {
    const params = [
      { slider: 'distortSlider', input: 'distortVal', min: 0, max: 100 },
      { slider: 'vignetteSlider', input: 'vignetteVal', min: 0, max: 100 },
      { slider: 'contrastSlider', input: 'contrastVal', min: 0, max: 20 },
      { slider: 'highlightsSlider', input: 'highlightsVal', min: -100, max: 100 },
      { slider: 'midtonesSlider', input: 'midtonesVal', min: -100, max: 100 },
      { slider: 'shadowsSlider', input: 'shadowsVal', min: -100, max: 100 },
      { slider: 'blacksSlider', input: 'blacksVal', min: -100, max: 100 },
      { slider: 'mosaicSlider', input: 'mosaicVal', min: 2, max: 24 },
      { slider: 'glitchSlider', input: 'glitchVal', min: 1, max: 100 },
      { slider: 'scanlineSlider', input: 'scanlineVal', min: 0, max: 10 }
    ];

    params.forEach(p => {
      const randomVal = Math.floor(Math.random() * (p.max - p.min + 1)) + p.min;
      const sliderEl = document.getElementById(p.slider);
      if (sliderEl) sliderEl.value = randomVal;
      syncParam(p.input, randomVal);
    });

    setConfigName('自定义');
    scheduleProcess();
  }

  /* ═══ 防抖调度实时处理 ═══ */
  let _processTimer = null;
  function scheduleProcess() {
    if (_processTimer) clearTimeout(_processTimer);
    _processTimer = setTimeout(() => { processImage(); }, 80);
  }

  /* ═══ 主处理流程 ═══ */
  function processImage() {
    if (!state.originalImage) return;
    document.getElementById('processStatus').textContent = '处理中...';

    setTimeout(() => {
      const canvas = document.getElementById('mainCanvas');
      const ctx = canvas.getContext('2d');

      canvas.width = state.originalImage.width;
      canvas.height = state.originalImage.height;
      ctx.drawImage(state.originalImage, 0, 0);

      if (isStepEnabled(1)) {
        const distort = parseInt(document.getElementById('distortSlider').value);
        const vignette = parseInt(document.getElementById('vignetteSlider').value);
        if (distort > 0) applyBarrelDistortion(canvas, distort);
        if (vignette > 0) applyVignette(canvas, vignette);
      }

      if (isStepEnabled(2)) {
        const contrast = parseInt(document.getElementById('contrastSlider').value);
        const highlights = parseInt(document.getElementById('highlightsSlider').value);
        const midtones = parseInt(document.getElementById('midtonesSlider').value);
        const shadows = parseInt(document.getElementById('shadowsSlider').value);
        const blacks = parseInt(document.getElementById('blacksSlider').value);

        if (contrast !== 0 || highlights !== 0 || midtones !== 0 || shadows !== 0 || blacks !== 0) {
          applyTonesAndContrast(canvas, contrast, highlights, midtones, shadows, blacks);
        }
      }

      if (isStepEnabled(3)) {
        applyThresholdPosterize(canvas, 14);
      }

      if (isStepEnabled(4)) {
        applyColorIndex(canvas, state.palette);
      }

      if (isStepEnabled(5)) {
        const msSize = parseInt(document.getElementById('mosaicSlider').value);
        applyMosaic(canvas, msSize);
      }

      if (isStepEnabled(7)) {
        const msSize = isStepEnabled(5) ? parseInt(document.getElementById('mosaicSlider').value) : 4;
        const glitchEnabled = document.getElementById('glitchToggle').classList.contains('on');
        const glitchIntensity = parseInt(document.getElementById('glitchSlider').value);
        const rgbSplit = document.getElementById('rgbSplitToggle').classList.contains('on');
        const scanline = parseInt(document.getElementById('scanlineSlider').value);

        if (glitchEnabled && glitchIntensity > 0) applyBlackBlockGlitch(canvas, glitchIntensity, msSize);
        if (rgbSplit) applyRGBSplit(canvas, Math.max(2, Math.floor(msSize * 0.8)));

        let distortStrength = 0;
        if (isStepEnabled(1)) {
          distortStrength = parseInt(document.getElementById('distortSlider').value);
        }
        if (scanline > 0) applyScanlines(canvas, scanline, distortStrength);
      }

      document.getElementById('processStatus').textContent = '实时预览';
    }, 10);
  }

  function downloadResult() {
    const canvas = document.getElementById('mainCanvas');
    if (!state.originalImage) return;

    // 获取自定义名称，若空则使用原逻辑
    let customName = document.getElementById('exportName').value.trim();
    if (!customName) {
      customName = '帧影版_' + (state.fileName ? state.fileName.replace(/\.[^/.]+$/, "") : '输出');
    }

    const link = document.createElement('a');
    link.download = customName + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>
